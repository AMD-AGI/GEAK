# RAG Pipeline Configuration
# Parameters for ablation experiments

retrieval:
  embed_top_k: 25          # Number of embedding retrieval candidates
  bm25_top_k: 25           # Number of BM25 retrieval candidates
  enable_bm25: true        # Enable BM25 dual-channel recall
  mcp_top_k: 3             # Number of final results returned

reranker:
  enable_reranker: true    # Enable reranking stage

fusion:
  rrf_k: 60                # RRF fusion constant
  semantic_weight: 0.7     # Embedding weight
  bm25_weight: 0.3         # BM25 weight

summary:
  enable_rag_subagent: true           # Enable LLM summarization
  rag_subagent_model: "claude-opus-4.5"

chunking:
  chunk_size: 1500           # Max characters per chunk
  chunk_overlap: 200         # Overlap characters between chunks
  min_chunk_size: 200        # Chunks shorter than this are discarded
  enable_header_split: false  # Enable Markdown header splitting (phase 1)

debug:
  verbose: false           # Print verbose MCP tool logs
