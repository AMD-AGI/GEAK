    <optimization_strategy_exploration>
    PHASE 2 STRATEGY EXPLORATION (only after correctness passes):

    1. Profile the correct FlyDSL kernel to identify bottlenecks.
       Use `profile_kernel` to get Metrix analysis (memory-bound vs compute-bound).
    2. Identify 3-5 MI300X-targeted optimization strategies:
       - **Vectorized buffer loads**: Use BufferCopy128b (128-bit) for 4xfloat32
         loads per thread — maximizes MI300X's HBM3 bandwidth utilization.
       - **Buffer tensor optimization**: Use `fx.rocdl.make_buffer_tensor()` for
         all input reads — uses hardware buffer descriptors for faster access.
       - **Tile-based processing**: Use `fx.logical_divide` / `fx.zipped_divide`
         with tile sizes that map well to MI300X CUs (block_dim=256, vec_width=4).
       - **Block/grid tuning**: Target grid sizes ≥304 (1 per CU) and
         block_dim multiple of 64 (wavefront size).
       - **Fused computation in registers**: Load data once into register memrefs,
         perform all arithmetic, write back once — eliminates intermediate
         global memory traffic.
       - **LDS-backed reductions**: For reduction operations, use LDS address
         space memrefs for efficient cross-thread communication.
       - **Precision lowering**: If applicable, use FP16/BF16 for 2x throughput.
    3. Use `strategy_manager` with "next" to get the recommended strategy.
    4. Try strategies one at a time, measure impact with `save_and_test`.
    5. Keep successful optimizations, revert failures.
    6. Combine successful strategies for maximum performance.
    </optimization_strategy_exploration>

  instance_template: |
    Task: {{task}}

    You can use tool calls to execute commands and edit files.

    ## PyTorch-to-FlyDSL Translation Workflow

    IMPORTANT: You MUST write FlyDSL code using `flydsl.compiler` and `flydsl.expr`.
    Do NOT use Triton. Do NOT fall back to any other kernel language.

    ### Phase 1: Achieve Correctness

    1. **Read the PyTorch reference**
       - Read the kernel file to understand the computation.
       - Identify input/output shapes, dtypes, and the exact computation.
       - Note `get_inputs()`, `get_init_inputs()`, and shape constants.

    2. **Check the FlyDSL environment**
       - Run `python3 -c "import flydsl; print('FlyDSL', flydsl.__version__)"` to verify.
       - If the import fails, check PYTHONPATH and LD_LIBRARY_PATH:
         ```
         export PYTHONPATH=/workspace/FlyDSL/build-fly/python_packages:/workspace/FlyDSL:$PYTHONPATH
         export LD_LIBRARY_PATH=/workspace/FlyDSL/build-fly/python_packages/flydsl/_mlir/_mlir_libs:$LD_LIBRARY_PATH
         ```
       - Also look at existing FlyDSL examples in the repo for API patterns.

    3. **Create the FlyDSL kernel**
       - Create the kernel file at the path expected by the test harness.
       - The file MUST expose a `Model` class with `forward()` or a `forward()` function.
       - Start with a SIMPLE implementation — just get it correct first.
       - Use the FlyDSL API:
         ```python
         import torch
         import flydsl.compiler as flyc
         import flydsl.expr as fx

         @flyc.kernel
         def my_kernel(A: fx.Tensor, B: fx.Tensor, ...):
             bid = fx.block_idx.x
             tid = fx.thread_idx.x
             A = fx.rocdl.make_buffer_tensor(A)
             # ... tile, load, compute, store ...

         @flyc.jit
         def run_my_kernel(A: fx.Tensor, B, ..., stream: fx.Stream = fx.Stream(None)):
             grid_x = ...
             my_kernel(A, B, ...).launch(grid=(grid_x, 1, 1), block=[256, 1, 1], stream=stream)

         class Model(torch.nn.Module):
             def __init__(self):
                 super().__init__()
             def forward(self, *args):
                 # Convert torch tensors, call FlyDSL JIT, synchronize
                 out = torch.empty(...)
                 tA = flyc.from_dlpack(args[0]).mark_layout_dynamic(leading_dim=0, divisibility=4)
                 run_my_kernel(tA, out, ..., stream=torch.cuda.Stream())
                 torch.cuda.synchronize()
                 return out
         ```

    4. **Test correctness**
       - Call `save_and_test` with description: "Initial FlyDSL translation"
       - If correctness FAILS:
         * Read the error output carefully
         * Common issues: shape mismatch, dtype mismatch, numerical precision,
           tile size not dividing tensor size, missing synchronize
         * Fix and call `save_and_test` again
       - REPEAT until correctness PASSES.

    ### Phase 2: Optimize Performance (only after correctness passes)

    5. **Establish baseline**
       - Note the PyTorch latency from the correctness-passing `save_and_test` output.
       - Use `strategy_manager` tool with command "create" to set up strategy tracking.

    6. **Profile the kernel on MI300X**
       - Use `profile_kernel` to get Metrix hardware analysis.
       - Determine if memory-bound (likely on MI300X) or compute-bound.
       - Check CU occupancy, LDS usage, VGPR count, memory bandwidth utilization.
       - On MI300X, memory-bound kernels benefit most from vectorized loads and fusion.

    7. **Explore optimization strategies**
       - Use `strategy_manager` tool with command "next" to get recommended strategy.
       - FlyDSL-specific optimizations to try:
         * Use BufferCopy128b for 128-bit vectorized loads
         * Increase vec_width from 1 to 4 (process more elements per thread)
         * Tune block_dim (64, 128, 256) for best occupancy
         * Use register memrefs to keep intermediate results in registers
         * Fuse all element-wise ops into a single kernel body
       - Call `save_and_test` after each change.
       - Track results in the strategy file.

    8. **Combine successful strategies**
       - Apply all successful optimizations together.
       - Verify correctness is maintained.
       - Run final `save_and_test`.

    9. **Submit**
       - Use `strategy_manager` with "summary" to review.
       - Use `submit` tool with final summary including:
         * Whether correctness was achieved
         * Best FlyDSL latency vs PyTorch latency
         * Speedup ratio
         * Key optimizations that worked

    ## Important Rules

    1. Every response must contain exactly one tool call.
    2. Directory or environment variable changes are not persistent.
    3. PHASE 1 (correctness) MUST succeed before starting PHASE 2 (performance).
    4. The FlyDSL kernel file path is specified in the task context.
    5. You MUST use FlyDSL (`flydsl.compiler`, `flydsl.expr`). Do NOT use Triton.

