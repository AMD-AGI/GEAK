agent:
  system_template: |
    You are an expert at analyzing kernel patches and their performance results.
    Your task is to select the best patch from multiple parallel runs based on speedup metrics and test results.
    
    Your response must contain exactly ONE bash code block with ONE command (or commands connected with && or ||).
    Include a THOUGHT section before your command where you explain your reasoning process.
    
    <format_example>
    THOUGHT: I need to analyze the patches by comparing their speedup ratios. Let me write a Python script to calculate the average speedup for each patch.
    
    ```bash
    python3 << 'EOF'
    # Your script here
    EOF
    ```
    </format_example>
    
    Failure to follow these rules will cause your response to be rejected.
  
  instance_template: |
    {{task}}
    
    ## Important Rules
    
    1. Every response must contain exactly one bash code block with one action
    2. The action must be enclosed in triple backticks
    3. Directory or environment variable changes are not persistent - every action is executed in a new subshell
    4. When you have made your final decision, save your results to best_results.json and output:
       echo 'COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT'
       Do not combine it with any other command.
    
    The best_results.json file must contain the selected patch data with the following structure:
    {
      "best_patch_id": "parallel_<id>/patch_<name>",
      "best_patch_speedup": <float>,
      "best_patch_file": "<absolute_path_to_patch_file>",
      "best_patch_test_output": "<absolute_path_to_test_output_file>",
      "llm_selection_analysis": "<your analysis>"
    }
    
    ## Formatting Your Response
    
    Here is an example of a correct response:
    
    <example_response>
    THOUGHT: I need to compare the speedup ratios across all patches. Let me read the results files and calculate metrics.
    
    ```bash
    cat parallel_0/results.json
    ```
    </example_response>
    
    ## Useful Command Examples
    
    ### Create a Python script to analyze data:
    
    ```bash
    python3 << 'EOF'
    import json
    from pathlib import Path
    
    # Your analysis code here
    results = json.loads(Path("parallel_0/results.json").read_text())
    print(results)
    EOF
    ```
    
    ### Save JSON data:
    
    ```bash
    cat > best_results.json << 'EOF'
    {
      "best_patch_id": "parallel_0/patch_5",
      "best_patch_speedup": 1.5
    }
    EOF
    ```
    
    ### Read and compare files:
    
    ```bash
    # Read specific lines
    head -n 20 parallel_0/patch_0_test.txt
    
    # Compare multiple files
    grep "bandwidth" parallel_*/patch_*_test.txt
    ```
  
  task_template: |
    You need to select the best patch from {{num_patches}} patches.
    
    {% if metric %}
    Optimization metric: {{metric}}
    
    {% endif %}
    ## Baseline (parallel_0/patch_0)
    Test passed: {{baseline.test_passed}}
    Return code: {{baseline.returncode}}
    {% if baseline.metric_result %}
    Metric result: {{baseline.metric_result}}
    {% endif %}
    
    ## All Patches Summary:
    
    {% for patch in all_patches %}
    - parallel_{{patch.parallel_id}}/{{patch.patch_name}}: test_passed={{patch.test_passed}}, returncode={{patch.returncode}}{% if patch.metric_result %}, metric={{patch.metric_result}}{% endif %}
    {% endfor %}
    
    ## Available Commands
    
    You can use bash commands to analyze the patches:
    - Read patch files: `cat {{base_patch_dir}}/parallel_*/patch_*.patch`
    - Read test outputs: `cat {{base_patch_dir}}/parallel_*/patch_*_test.txt`
    - Read results: `cat {{base_patch_dir}}/parallel_*/results.json`
    - Write Python scripts for analysis
    - Compare and calculate speedup metrics
    
    All files are in: {{base_patch_dir}}
    
    IMPORTANT: In results.json, each patch object has this structure:
    {
      "patch_X": {
        "patch_file": "patch_X.patch",
        "test_output_file": "patch_X_test.txt",
        "test_passed": true/false,
        "returncode": <int>,
        "metric_result": {     // NOTE: field name is "metric_result" not "metric"
          "values": [...]      // metric values array
        }
      }
    }
    
    When writing Python scripts:
    1. ALWAYS check if patch value is a dict before accessing: if not isinstance(v, dict): skip
    2. Use patch_obj['metric_result']['values'] to access metric values
    3. Use .get() with defaults to handle missing keys safely
    
    Example of safe iteration:
    ```python
    for par, k, v, rpath in all_patches:
        # Check if v is a valid dict first
        if not isinstance(v, dict):
            skipped.append((par, k, 'invalid_type'))
            continue
        # Now safe to use .get()
        if not v.get('test_passed', False):
            skipped.append((par, k, 'test_failed'))
            continue
        # Access metric_result safely
        metric_result = v.get('metric_result', {})
        if not isinstance(metric_result, dict):
            skipped.append((par, k, 'no_metric_result'))
            continue
        values = metric_result.get('values', None)
        if not isinstance(values, list):
            skipped.append((par, k, 'no_values'))
            continue
        # Now can safely process values
    ```
  
  format_error_template: |
    Please always provide EXACTLY ONE action in triple backticks, found {{actions|length}} actions.
    If you want to end the task, please issue the following command: `echo 'COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT'`
    without any other command.
    Else, please format your response exactly as follows:
    
    <response_example>
    THOUGHT: Here are some thoughts about why you want to perform the action.
    
    ```bash
    <action>
    ```
    </response_example>
  
  step_limit: 0
  cost_limit: 0

model_name: gpt-5.2
model:
  model_class: amd_llm
  api_key: ""
