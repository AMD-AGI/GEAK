  instance_template: |
    Task: {{task}}

    You can execute bash commands and edit files to implement the necessary changes.

    ## Recommended Workflow for Kernel Optimization

    This workflow uses an **exploration-based approach** for systematic optimization through experimentation.

    **Strategy Exploration Method**: For complex optimizations, create a strategy exploration file to track different optimization directions and their actual performance impact.

    1. **Understand the Task**
       - Analyze the task requirements carefully (may include code paths, descriptions, or specific optimization goals)
       - Explore the directory structure and identify relevant kernel files
       - Understand the current implementation and its context
       - For complex tasks: Create `.optimization_strategies.md` with 3-5 potential optimization strategies

    2. **Establish Baseline Performance** 
       - **CRITICAL**: Measure original implementation performance BEFORE any optimization
       - Run existing benchmarks or create simple performance tests
       - Save detailed benchmark output to a log file (e.g., `baseline_benchmark.log`)
       - Record key metrics summary in your strategy file (bandwidth, throughput, latency, occupancy, etc.)
       - Include reference to the detailed log file
       - This baseline is your reference point - all strategy results will be compared against it

    3. **Analyze and Prioritize Strategies**
       - Profile the code to identify performance bottlenecks (memory-bound vs compute-bound)
       - Analyze computational complexity, memory access patterns, and parallelization opportunities
       - **Adjust strategy list based on analysis**: Mark strategies as `[skipped]` if not applicable, add new strategies if needed, reorder by priority
       - Prioritize strategies based on bottleneck analysis (e.g., focus on memory optimizations if memory-bound)
       - Update strategy file with expected improvements for each strategy

    4. **Explore Strategy 1**
       - Mark first strategy as `[exploring]` in your strategy file
       - Implement the optimization (e.g., memory coalescing, vectorization, shared memory)
       - Verify correctness with tests after implementation
       - Run benchmarks and save detailed output to log file (e.g., `strategy1_benchmark.log`)
       - **Calculate relative change** compared to baseline (e.g., +21.1% improvement or -4.7% regression)
       - Record ONLY the relative change (percentage) in strategy file, not absolute values
       - Include reference to detailed log file for full metrics
       - **Decision**: If successful (performance improved), keep it. If failed (regression), revert the changes.

    5. **Explore Additional Strategies**
       - Repeat step 4 for each remaining strategy in your list
       - Try strategies individually first to isolate their impact
       - **Dynamically adjust strategy list based on results**: If a strategy reveals new optimization opportunities, add them; if multiple strategies fail in similar ways, skip related ones
       - After testing individually, consider combining successful strategies
       - Track cumulative performance gains as you combine strategies
       - Update strategy file after each experiment

    6. **Combine and Refine**
       - Combine multiple successful strategies for maximum performance
       - Test for synergistic effects (combined effect may be better than sum of parts)
       - Re-balance parameters to optimize strategy interactions (parameters optimal for individual strategies may need adjustment when combined)
       - Verify correctness is maintained after combining strategies

    7. **Final Verification and Benchmarking**
       - Verify correctness is maintained after combining strategies
       - Run comprehensive benchmarks on final optimized version
       - Compare against baseline to calculate total improvement
       - View your `.optimization_strategies.md` file to review the complete optimization journey
       - Document all successful strategies and their individual/combined contributions
       
    8. **Submit Final Output**
       - Review your strategy exploration file for a summary of what worked and what didn't
       - When satisfied with your implementation, issue: `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`
       - Do not combine it with any other command. <important>After this command, you cannot continue working on this task.</important>

    ## Optimization Strategy Exploration (Recommended for Complex Optimizations)

    For kernel optimization tasks, use a systematic exploration approach. Track different optimization strategies in `.optimization_strategies.md`.

    Use the **strategy-manager tool** to create and manage your strategy list. This tool provides a consistent interface and ensures proper formatting.

    See the **"Strategy List Management"** section in "Useful command examples" below for detailed commands.

    ### Strategy Status Labels:
    - `[baseline]` - Original performance (measure this first!)
    - `[pending]` - Strategy not yet tried
    - `[exploring]` - Currently implementing/testing this strategy
    - `[successful]` - Performance improved, keep this optimization
    - `[failed]` - Performance degraded or no improvement, revert
    - `[partial]` - Some improvement but below expectation
    - `[combined]` - Combining multiple successful strategies
    
    ## Important Rules

    1. Every response must contain exactly one action
    2. The action must be enclosed in triple backticks
    3. Directory or environment variable changes are not persistent. Every action is executed in a new subshell.
       However, you can prefix any action with `MY_ENV_VAR=MY_VALUE cd /path/to/working/dir && ...` or write/load environment variables from files

    <system_information>
    {{system}} {{release}} {{version}} {{machine}}
    </system_information>

    ## Formatting your response

    Here is an example of a correct response:

    <example_response>
    THOUGHT: I need to understand the structure of the kernel codebase first. Let me check what files are in the current directory to identify kernel implementations and any existing benchmarks or tests.

    ```bash
    ls -la
    ```
    </example_response>

    ## Useful command examples

    ### Strategy List Management (using optool command):

    **optool** is a built-in command for managing optimization strategies. It provides a simple interface for tracking your exploration process.

    ```bash
    # Create initial strategy list with baseline metrics and initial strategies
    optool create \
      --baseline-metrics "Bandwidth:152.3 GB/s" \
      --baseline-metrics "Latency:23.4 ms" \
      --baseline-log "baseline_benchmark.log" \
      --strategies "Memory Coalescing|Optimize memory access patterns|+20-30%|Memory-bound" \
      --strategies "Shared Memory|Use shared memory for reduction|+15-25%|Reduce global memory"
    
    # View all strategies
    optool show
    
    # View specific strategy details
    optool show 1
    
    # Get help on available commands
    optool help
    
    # Mark strategy as exploring (start working on it)
    optool mark 1 exploring
    
    # Record successful strategy
    optool mark 1 successful --result "+21.1% improvement (KEEP)" --details "strategy1_benchmark.log"
    
    # Record failed strategy
    optool mark 2 failed --result "-3.2% regression (REVERTED)" --details "Register pressure increased, reduced occupancy"
    
    # Record partial success
    optool mark 3 partial --result "+7.2% improvement (below expected 20-30%)"
    
    # Add new strategy during exploration
    optool add "Loop Unrolling" "Unroll inner loops to reduce overhead" "+10-15%" --target "Reduce loop overhead"
    
    # Skip strategy (mark as not applicable)
    optool remove 3 --method skip
    
    # Delete strategy completely (use sparingly - prefer skip to preserve history)
    optool remove 3 --method delete
    
    # Update strategy fields
    optool update 1 --status exploring --details "Currently testing different tile sizes"
    
    # Add note to document insights or decisions
    optool note "Prioritized memory optimizations based on profiling results showing memory-bound bottleneck"
    ```

    **Note**: The strategy file (.optimization_strategies.md) can be created manually or using the CLI tool:
    ```bash
    # Alternative: Use CLI tool to create initial file (if needed)
    python -m minisweagent.tools.strategy_manager create \
      --baseline-metrics "Bandwidth:152.3 GB/s" \
      --baseline-log "baseline_benchmark.log" \
      --strategies "Memory Coalescing|Optimize memory access patterns|+20-30%|Memory-bound"
    ```

    ### Create a new file:

    ```bash
    cat <<'EOF' > newfile.py
    import numpy as np
    hello = "world"
    print(hello)
    EOF
    ```

    ### Edit files with sed:

    {%- if system == "Darwin" -%}
    <important>
    You are on MacOS. For all the below examples, you need to use `sed -i ''` instead of `sed -i`.
    </important>
    {%- endif -%}

    ```bash
    # Replace all occurrences
    sed -i 's/old_string/new_string/g' filename.py

    # Replace only first occurrence
    sed -i 's/old_string/new_string/' filename.py

    # Replace first occurrence on line 1
    sed -i '1s/old_string/new_string/' filename.py

    # Replace all occurrences in lines 1-10
    sed -i '1,10s/old_string/new_string/g' filename.py
    ```

    ### View file content:

    ```bash
    # View specific lines with numbers
    nl -ba filename.py | sed -n '10,20p'
    ```

