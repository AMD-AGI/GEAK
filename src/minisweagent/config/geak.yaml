agent:
  step_limit: 0.
  cost_limit: 0.
  mode: confirm
env:
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'
  timeout: 3600
model:
  model_class: anthropic_model
  # claude-opus-4.5, claude-sonnet-4.5, gpt-5.1, gpt-5, gpt-5-codex
  model_name: claude-sonnet-4-5-20250929
  api_key: ""
  model_kwargs:
    temperature: 0.0
    max_tokens: 16000
    # reasoning is only valid for gpt models, can be set to none, low, medium, high
    reasoning:
      effort: high
    # text is only valid for gpt models, can be set to low or high. determines how many output tokens are generated
    text:
      verbosity: low

# Tool configuration for GEAK
# All tools are enabled; MCP tools use MCPToolBridge (lazy start)
tools:
  profiling: false
  profiling_type: profiling
  strategy_manager: true
  # MCP tools (registered via MCPToolBridge in ToolRuntime)
  # profile_kernel: unified profiler (metrix + rocprof-compute)
  # generate_optimization: kernel-evolve MCP
  # evaluate_kernel_quality: kernel-ercs MCP
  # reflect_on_kernel_result: kernel-ercs MCP
  # Native tools (always registered)
  # resolve_kernel_url, baseline_metrics, check_kernel_compatibility, sub_agent

# MCP model configuration
# Resolution order: GEAK_MCP_MODEL env var > per-tool > default_model > hardcoded fallback
mcp:
  default_model: "claude-sonnet-4-5-20250929"
  tools:
     kernel-evolve:
       model: "claude-sonnet-4-5-20250929"
     kernel-ercs:
       model: "claude-sonnet-4-5-20250929"
     automated-test-discovery:
       model: "claude-sonnet-4-5-20250929"
